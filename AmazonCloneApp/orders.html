<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Amazon Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.order-card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.status{
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-size:14px;
    font-weight:bold;
}

.delivered{
    background:green;
}

.shipped{
    background:#ff9900;
}

.processing{
    background:#007bff;
}

.order-card h3{
    margin-bottom:10px;
}

.order-card p{
    margin:5px 0;
}

</style>

</head>
<body>

<header class="navbar">

<div class="logo">
Amazon<span>Clone</span>
</div>

<div class="nav-links">

<a href="index.html">
<i class="fas fa-house"></i>
Home
</a>

<a href="cart.html">
<i class="fas fa-cart-shopping"></i>
Cart
</a>

<a href="profile.html">
<i class="fas fa-user"></i>
Profile
</a>

<a href="settings.html">
<i class="fas fa-gear"></i>
Settings
</a>

</div>

</header>

<div class="page-box">

<h1>📦 My Orders</h1>

<div class="order-card">

<h3>Laptop</h3>

<p>Price: ₹45,999</p>

<p>
Status:
<span class="status delivered">
Delivered
</span>
</p>

</div>

<div class="order-card">

<h3>Smart Watch</h3>

<p>Price: ₹3,999</p>

<p>
Status:
<span class="status shipped">
Shipped
</span>
</p>

</div>

<div class="order-card">

<h3>Headphones</h3>

<p>Price: ₹2,499</p>

<p>
Status:
<span class="status processing">
Processing
</span>
</p>

</div>

<div class="order-card">

<h3>Camera</h3>

<p>Price: ₹28,999</p>

<p>
Status:
<span class="status delivered">
Delivered
</span>
</p>

</div>

</div>

</body>
</html>
